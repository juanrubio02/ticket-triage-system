services:
  db:
    image: postgres:16
    container_name: ticket-triage-db
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: ticket_triage
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d ticket_triage"]
      interval: 5s
      timeout: 3s
      retries: 30
    restart: unless-stopped

  api:
    build: .
    container_name: ticket-triage-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # OJO: deja SOLO UNA de estas dos, según tu código:
      # Si tu código lee DB_URL:
      - DB_URL=postgresql+psycopg://app:app@db:5432/ticket_triage
      # Si tu código lee DATABASE_URL, cambia la línea anterior por:
      # - DATABASE_URL=postgresql+psycopg://app:app@db:5432/ticket_triage
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
